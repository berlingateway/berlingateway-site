<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Berlin Gateway | التقييم الأولي</title>
  <meta name="description" content="التقييم الأولي — Berlin Gateway. املأ البيانات لنحدد المسار الصحيح نحو الاعتراف والعمل في ألمانيا." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* Page-specific styles (form, panel, etc.) */
    .panel {
      background: linear-gradient(180deg, #fff 0%, #fbfdff 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    label {
      display: block;
      font-weight: 800;
      margin: 0 0 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .full {
      grid-column: 1 / -1;
    }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 8px;
      line-height: 1.7;
    }

    .cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
      min-width: 240px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn.primary {
      background: var(--navy);
      color: #fff;
      border-color: transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .btn {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Header will be inserted by layout.js -->

    <section class="panel">
      <h1>التقييم الأولي (مجاني)</h1>
      <p class="sub">
        املأ البيانات بدقة. سنراجعها ونرد عليك عبر البريد/واتساب حسب البيانات التي أدخلتها.
      </p>

      <!-- ✅ FormSubmit (Email: info@berlingateway.de) -->
      <form action="https://formsubmit.co/info@berlingateway.de" method="POST">
        <!-- إعدادات -->
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_subject" value="Berlin Gateway | New Eligibility Submission" />
        <input type="hidden" name="_next" value="https://berlingateway.de/ar/thankyou.html" />

        <div class="grid">
          <div>
            <label>الاسم الكامل</label>
            <input name="full_name" type="text" placeholder="مثال: أحمد محمد" required />
          </div>

          <div>
            <label>البريد الإلكتروني</label>
            <input name="email" type="email" placeholder="name@example.com" required />
          </div>

          <div>
            <label>رقم واتساب (اختياري)</label>
            <input name="whatsapp" type="text" placeholder="+49 ... / +213 ..." />
          </div>

          <div>
            <label>الدولة الحالية</label>
            <input name="current_country" type="text" placeholder="مثال: الجزائر / مصر / ألمانيا" required />
          </div>

          <div>
            <label>المجال</label>
            <select name="field" required>
              <option value="" selected disabled>اختر</option>
              <option>طب / صحة</option>
              <option>تمريض</option>
              <option>هندسة</option>
              <option>تقنية المعلومات</option>
              <option>حِرف (Handwerk)</option>
              <option>أخرى</option>
            </select>
          </div>

          <div>
            <label>أعلى مؤهل</label>
            <select name="highest_degree" required>
              <option value="" selected disabled>اختر</option>
              <option>ثانوي</option>
              <option>دبلوم</option>
              <option>بكالوريوس</option>
              <option>ماجستير</option>
              <option>دكتوراه</option>
            </select>
          </div>

          <div>
            <label>سنوات الخبرة</label>
            <select name="experience_years" required>
              <option value="" selected disabled>اختر</option>
              <option>0–1</option>
              <option>2–4</option>
              <option>5–9</option>
              <option>10+</option>
            </select>
          </div>

          <div>
            <label>مستوى الألمانية</label>
            <select name="german_level" required>
              <option value="" selected disabled>اختر</option>
              <option>لا يوجد</option>
              <option>A1</option>
              <option>A2</option>
              <option>B1</option>
              <option>B2</option>
              <option>C1+</option>
            </select>
          </div>

          <div class="full">
            <label>هدفك في ألمانيا</label>
            <select name="goal" required>
              <option value="" selected disabled>اختر</option>
              <option>الاعتراف المهني (Anerkennung)</option>
              <option>عمل مباشر</option>
              <option>تدريب مهني (Ausbildung)</option>
              <option>بطاقة الفرصة (Chancenkarte)</option>
              <option>مسار دراسي</option>
            </select>
          </div>

          <div class="full">
            <label>ملاحظات مهمة (اختياري)</label>
            <textarea name="notes" placeholder="أي تفاصيل: اسم التخصص، جهة التخرج، وثائق متوفرة، مواعيد، إلخ..."></textarea>
          </div>
        </div>

        <div class="cta">
          <button class="btn primary" type="submit">إرسال التقييم الآن</button>
          <a class="btn" href="mailto:info@berlingateway.de">تواصل عبر البريد</a>
        </div>

        <div class="hint">
          بإرسالك لهذا النموذج، أنت توافق على أن يتم التواصل معك للرد على التقييم. لا نطلب أي بيانات حساسة.
        </div>
      </form>
    </section>

    <!-- Footer will be inserted by layout.js -->
  </div>

  <script src="/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      BGLayout.initializeLayout({
        lang: 'ar',
        currentPage: '/ar/eligibility.html'
      });
    });
  </script>
</body>
</html>
