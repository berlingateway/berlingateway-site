<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="canonical" href="https://berlingateway.de/templates/chancenkarte_de">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .chancenkarte-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .chancenkarte-hero {
            margin-bottom: 50px;
            text-align: center;
        }
        .chancenkarte-hero h1 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 15px;
            color: #000;
        }
        .chancenkarte-hero p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .chancenkarte-form-wrapper {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
        }
        .chancenkarte-form-wrapper h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            color: #000;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: Inter, sans-serif;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0B3B8C;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1);
        }
        .form-group small {
            display: block;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .form-submit {
            width: 100%;
            min-height: 58px;
            background: #0B3B8C;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
            opacity: 1;
            visibility: visible;
        }
        .form-submit:hover {
            background: #082B5C;
        }
        .form-submit:active {
            background: #082B5C;
        }
    </style>
</head>
<body>

{% include 'includes/header_de.html' %}

<main>
    <div class="chancenkarte-container">
        <div class="chancenkarte-hero">
            <h1>{{ hero_title }}</h1>
            <p>{{ hero_subtitle }}</p>
        </div>

        <div class="chancenkarte-form-wrapper">
            <h2>{{ form_title }}</h2>
            <div class="form-container" style="padding:0;border:none;box-shadow:none;background:transparent;">
                <iframe 
                    src="https://tally.so/embed/eqYl0Q?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                    loading="lazy" 
                    width="100%" 
                    height="800" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0"
                    style="border-radius:12px;">
                </iframe>
            </div>
        </div>
    </div>
</main>

{% include 'includes/footer_de.html' %}

</body>
</html>
