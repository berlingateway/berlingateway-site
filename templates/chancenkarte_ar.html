<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="canonical" href="https://berlingateway.de/templates/chancenkarte_ar/">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .chancenkarte-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .chancenkarte-hero {
            margin-bottom: 50px;
            text-align: center;
        }
        .chancenkarte-hero h1 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 15px;
            color: #000;
        }
        .chancenkarte-hero p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .chancenkarte-form-wrapper {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
        }
        .chancenkarte-form-wrapper h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            color: #000;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: Inter, sans-serif;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0B3B8C;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1);
        }
        .form-group small {
            display: block;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .form-submit {
            width: 100%;
            min-height: 58px;
            background: #0B3B8C;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
            opacity: 1;
            visibility: visible;
        }
        .form-submit:hover {
            background: #082B5C;
        }
        .form-submit:active {
            background: #082B5C;
        }
    </style>
</head>
<body>

{% include 'includes/header_ar.html' %}

<main>
    <div class="chancenkarte-container">
        <div class="chancenkarte-hero">
            <h1>{{ hero_title }}</h1>
            <p>{{ hero_subtitle }}</p>
        </div>

        <div class="chancenkarte-form-wrapper">
            <h2>{{ form_title }}</h2>
            <form action="https://formsubmit.co/info@berlingateway.de" method="POST" enctype="multipart/form-data">
                
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="Neue Anfrage - Berlin Gateway">
                
                <div class="form-group">
                    <label for="target-position">{{ form_field_1_label }}</label>
                    <input type="text" id="target-position" name="Zielberuf" placeholder="مثال: مهندس برمجيات" required>
                </div>

                <div class="form-group">
                    <label for="qualification">{{ form_field_2_label }}</label>
                    <input type="text" id="qualification" name="Abschluss" placeholder="مثال: ماجستير علوم الحاسوب" required>
                </div>

                <div class="form-group">
                    <label for="experience">{{ form_field_3_label }}</label>
                    <select id="experience" name="Berufserfahrung" required>
                        <option value="">-- يرجى الاختيار --</option>
                        <option value="0-2">0–2 سنة</option>
                        <option value="2-5">2–5 سنوات</option>
                        <option value="5+">5+ سنوات</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="language">{{ form_field_4_label }}</label>
                    <select id="language" name="Sprachkenntnisse" required>
                        <option value="">-- يرجى الاختيار --</option>
                        <option value="a1-a2">A1–A2</option>
                        <option value="b1">B1</option>
                        <option value="b2">B2</option>
                        <option value="c1+">C1+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="country">{{ form_field_5_label }}</label>
                    <select id="country" name="Wohnsitzland" required>
                        <option value="">يرجى الاختيار</option>
                        <option value="ألمانيا">ألمانيا</option>
                        <option value="مصر">مصر</option>
                        <option value="ليبيا">ليبيا</option>
                        <option value="تونس">تونس</option>
                        <option value="الجزائر">الجزائر</option>
                        <option value="المغرب">المغرب</option>
                        <option value="السودان">السودان</option>
                        <option value="السعودية">السعودية</option>
                        <option value="الإمارات">الإمارات</option>
                        <option value="قطر">قطر</option>
                        <option value="الكويت">الكويت</option>
                        <option value="عُمان">عُمان</option>
                        <option value="البحرين">البحرين</option>
                        <option value="الأردن">الأردن</option>
                        <option value="لبنان">لبنان</option>
                        <option value="سوريا">سوريا</option>
                        <option value="العراق">العراق</option>
                        <option value="فلسطين">فلسطين</option>
                        <option value="اليمن">اليمن</option>
                        <option value="تركيا">تركيا</option>
                        <option value="باكستان">باكستان</option>
                        <option value="الهند">الهند</option>
                        <option value="بنغلاديش">بنغلاديش</option>
                        <option value="نيجيريا">نيجيريا</option>
                        <option value="غانا">غانا</option>
                        <option value="الكاميرون">الكاميرون</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">{{ form_field_6_label }}</label>
                    <input type="email" id="email" name="E-Mail" placeholder="بريدك@example.com" required>
                </div>

                <div class="form-group">
                    <label for="cv-upload">{{ form_field_7_label }}</label>
                    <input type="file" id="cv-upload" name="CV Upload" accept=".pdf" required>
                    <small>PDF فقط، الحد الأقصى 5MB</small>
                </div>

                <button type="submit" class="form-submit">إرسال الطلب الآن</button>
            </form>
        </div>
    </div>
</main>

{% include 'includes/footer_ar.html' %}

</body>
</html>
