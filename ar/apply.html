<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>التدقيق الهيكلي | Berlin Gateway</title>
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="rtl">
<header class="header">
  <div class="container wrap">
    <div class="brand">BERLIN GATEWAY <span class="emblem"></span></div>
    <nav class="nav">
      <a href="/ar/">AR</a><span class="sep">·</span><a href="/de/apply.html">DE</a>
      <span class="sep">·</span><a href="/ar/system.html">منطق النظام</a>
      <a href="/ar/framework.html">الإطار</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="hero">
    <p class="kicker">Decision Gateway</p>
    <h1 class="h1">تصنيف هيكلي (رقمي)</h1>
    <div class="note">
      هذا الفحص ليس استشارة.<br/>
      هدفه التصنيف الهيكلي داخل نظام الكفاءات الألماني.
    </div>
  </section>

  <section class="section form">
    <div class="stepper" aria-hidden="true">
      <span class="pip on" id="p1"></span>
      <span class="pip" id="p2"></span>
      <span class="pip" id="p3"></span>
      <span class="pip" id="p4"></span>
      <span style="margin-right:8px">تسلسل داخلي</span>
    </div>

    <form id="bgForm" action="https://formsubmit.co/info@berlingateway.de" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="_subject" id="subj" value="">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" id="nextUrl" value="">
      <input type="hidden" name="Aktenzeichen" id="aktenzeichen" value="">
      <input type="hidden" name="Interne_Pruefsequenz" value="aktiviert">
      <input type="hidden" name="Automated_Notice" value="Diese Mitteilung erfolgt automatisiert.">
      <input type="hidden" name="Institutional_Signature" value="Berlin Gateway — Strukturelle Eintrittsarchitektur für Fachkräfte">

      <div class="step active" id="s1">
        <label>1) اختر فئة مؤهلك المهني</label>
        <select name="Kategorie" required>
          <option value="" selected disabled>اختر…</option>
          <option value="A — مهن منظمة (صحة/طب/صيدلة)">A — مهن منظمة (صحة/طب/صيدلة)</option>
          <option value="B — STEM أكاديمي (هندسة/IT/عمارة)">B — STEM أكاديمي (هندسة/IT/عمارة)</option>
          <option value="C — مهني (تقني/حِرف)">C — مهني (تقني/حِرف)</option>
          <option value="D — أكاديمي غير منظم (إدارة/أعمال)">D — أكاديمي غير منظم (إدارة/أعمال)</option>
        </select>
        <div class="actions">
          <button class="btn primary wide" type="button" onclick="nextStep(2)">التالي</button>
        </div>
      </div>

      <div class="step" id="s2">
        <label>2) إشارات الاعتراف (مختصر)</label>
        <select name="Anerkennung_Status" required>
          <option value="" selected disabled>اختر…</option>
          <option value="مهنة منظمة (اعتراف مطلوب)">مهنة منظمة (اعتراف مطلوب)</option>
          <option value="Anabin H+ / entspricht موجود">Anabin H+ / entspricht موجود</option>
          <option value="غير واضح / يحتاج فحص">غير واضح / يحتاج فحص</option>
        </select>

        <label>CV + الشهادة (PDF)</label>
        <input type="file" name="Dossier_PDF" accept="application/pdf" required />

        <div class="actions">
          <button class="btn" type="button" onclick="nextStep(1)">رجوع</button>
          <button class="btn primary wide" type="button" onclick="nextStep(3)">التالي</button>
        </div>
      </div>

      <div class="step" id="s3">
        <label>3) اللغة والخبرة</label>
        <select name="Deutsch_Level" required>
          <option value="" selected disabled>مستوى الألمانية…</option>
          <option>A0/A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1/C2</option>
        </select>

        <label>سنوات الخبرة</label>
        <input type="number" name="Erfahrung_Jahre" min="0" max="60" placeholder="مثال: 5" required />

        <div class="actions">
          <button class="btn" type="button" onclick="nextStep(2)">رجوع</button>
          <button class="btn primary wide" type="button" onclick="nextStep(4)">التالي</button>
        </div>
      </div>

      <div class="step" id="s4">
        <label>4) المدينة/الولاية + بيانات الاتصال</label>
        <input type="text" name="Zielregion" placeholder="برلين / NRW / …" required />

        <label>الاسم الكامل</label>
        <input type="text" name="Name" required />

        <label>البريد الإلكتروني</label>
        <input type="email" name="Email" required />

        <label>ملاحظة مختصرة (اختياري)</label>
        <textarea name="Hinweis" placeholder="اختياري: هدف وظيفي / زمن / تفاصيل"></textarea>

        <div class="actions">
          <button class="btn" type="button" onclick="nextStep(3)">رجوع</button>
          <button class="btn primary wide" type="submit">إرسال</button>
        </div>

        <p class="small" style="margin-top:12px;">
          النتيجة تُرسل عبر البريد بعد مراجعة داخلية.
        </p>
      </div>
    </form>
  </section>
</main>

<footer class="footer">
  <div class="container wrap">
    <div><b>Berlin Gateway</b> — بنية دخول هيكلية للكفاءات</div>
    <div>info@berlingateway.de</div>
  </div>
</footer>

<script>
  function setPips(n){
    for(let i=1;i<=4;i++){
      document.getElementById('p'+i).classList.toggle('on', i<=n);
    }
  }
  function nextStep(n){
    for(let i=1;i<=4;i++){
      document.getElementById('s'+i).classList.remove('active');
    }
    document.getElementById('s'+n).classList.add('active');
    setPips(n);
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function randomDigits(len){
    let s='';
    for(let i=0;i<len;i++) s+=Math.floor(Math.random()*10);
    return s;
  }
  function makeAktenzeichen(){
    const y = new Date().getFullYear();
    const block = randomDigits(4);
    const seq = randomDigits(5);
    return `BG-${y}-${block}-${seq}`;
  }

  const form = document.getElementById('bgForm');
  form.addEventListener('submit', function(){
    const id = makeAktenzeichen();
    document.getElementById('aktenzeichen').value = id;
    document.getElementById('subj').value = `Berlin Gateway | Aktenzeichen ${id} | Interne Prüfsequenz`;
    document.getElementById('nextUrl').value = `${location.origin}/ar/thankyou.html?id=${encodeURIComponent(id)}`;
  });
</script>
</body>
</html>
