<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>إرسال التقارير الطبية — Berlin Gateway</title>
  <link rel="stylesheet" href="/assets/css/app.css" />
  <style>
    body{font-family:'Inter',sans-serif;color:#0D1117;background:#FFFFFF;line-height:1.6}
    .top-band{background:#0B1F3A;color:#FFFFFF;padding:10px 0;font-size:13px}
    .top-band__inner{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
    .top-band a{color:rgba(255,255,255,0.8);text-decoration:none}
    .header{background:#FFFFFF;border-bottom:1px solid #E5E7EB;padding:16px 0;position:sticky;top:0;z-index:100}
    .header__inner{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-size:18px;font-weight:700;color:#0D1117;text-decoration:none;letter-spacing:-0.3px}
    .brand span{color:#0B3B8C}
    .nav a{color:#374151;text-decoration:none;font-size:14px;margin-right:24px;font-weight:500}
    .nav-cta{background:#0B1F3A;color:#FFFFFF !important;padding:8px 18px;border-radius:6px;font-weight:600 !important;margin-right:24px !important}
    .section{padding:72px 24px}
    .inner{max-width:1080px;margin:0 auto}
    .cta-block{background:#0B1F3A;border-radius:12px;padding:48px 40px;text-align:center;margin-top:40px}
    .cta-block h2{color:#FFFFFF;font-size:clamp(20px,3vw,28px);font-weight:700;margin-bottom:16px;line-height:1.3}
    .cta-block p{color:rgba(255,255,255,0.65);font-size:16px;margin-bottom:32px;line-height:1.7;font-weight:300;max-width:480px;margin-left:auto;margin-right:auto}
    .cta-btn{display:inline-block;background:#FFFFFF;color:#0B1F3A;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;padding:16px 36px;border-radius:6px;text-decoration:none}
    .footer{background:#0D1117;color:rgba(255,255,255,0.5);padding:32px 24px;text-align:center;font-size:13px}
  </style>
</head>
<body>
<div class="top-band">
  <div class="top-band__inner">
    <a href="mailto:info@berlingateway.de">✉ info@berlingateway.de</a>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="/en/send-medical-reports" class="lang-badge" style="background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:4px;font-size:12px;color:#fff;text-decoration:none;">English</a>
      <span style="opacity:.5">خبراء طبيون</span>
    </div>
  </div>
</div>
<header class="header">
  <div class="header__inner">
    <a href="/ar/" class="brand">Berlin <span>Gateway</span></a>
    <nav class="nav">
      <a href="/ar/visa">تأشيرة</a>
      <a href="/ar/aerzte">أطباء</a>
      <a href="/ar/assessment" class="nav-cta">التقييم</a>
    </nav>
  </div>
</header>
<main class="section">
  <div class="inner">
    <h1>إرسال تقاريرك الطبية</h1>
    <p class="lead">أرسل وثائقك الطبية بشكل آمن ليتم تقييمها من قبل كبار الأخصائيين والعيادات الألمانية.</p>
    <div style="background:#F8F9FA;border-radius:12px;padding:40px;margin-top:40px;">
      <iframe 
        src="https://tally.so/embed/eqYl0Q?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
        loading="lazy" 
        width="100%" 
        height="800" 
        frameborder="0" 
        marginheight="0" 
        marginwidth="0"
        style="border-radius:12px;">
      </iframe>
    </div>
  </div>
</main>
<footer class="footer">
  <p>© 2026 Berlin Gateway. جميع الحقوق محفوظة.</p>
</footer>
</body>
</html>
