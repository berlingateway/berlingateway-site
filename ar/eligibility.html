<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berlin Gateway | التقييم الأولي</title>
<style>
body{font-family:Arial;padding:30px;background:#f8fafc;}
input,select,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    padding:12px;
    background:#0f172a;
    color:white;
    border:none;
}
</style>
</head>
<body>

<h2>التقييم الأولي</h2>

<form action="https://formsubmit.co/info@berlingateway.de" method="POST">

<input type="hidden" name="_subject" value="Berlin Gateway | New Eligibility Submission">
<input type="hidden" name="_next" value="https://berlingateway.de/ar/thankyou.html">
<input type="hidden" name="_captcha" value="false">

<label>الاسم الكامل</label>
<input type="text" name="Full Name" required>

<label>البريد الإلكتروني</label>
<input type="email" name="Email" required>

<label>المهنة</label>
<input type="text" name="Profession" required>

<label>سنوات الخبرة</label>
<input type="text" name="Experience">

<label>مستوى اللغة الألمانية</label>
<select name="German Level">
<option>A1</option>
<option>A2</option>
<option>B1</option>
<option>B2</option>
<option>C1</option>
<option>None</option>
</select>

<label>ملاحظات إضافية</label>
<textarea name="Notes"></textarea>

<button type="submit">إرسال التقييم</button>

</form>

<br>
<a href="/framework.html">المنهج</a>

</body>
</html>
